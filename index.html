<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<!-- 🔥 Open Graph (Preview WhatsApp) -->
<meta property="og:title" content="🎉 Aniversário no Mercatto Delícia">
<meta property="og:description" content="Ganhe até R$ 100 OFF no mês do seu aniversário. Reserve agora!">
<meta property="og:image" content="https://raw.githubusercontent.com/grupodvbr/aniversariosmercatto/main/paste/Imagem%20do%20WhatsApp%20de%202025-08-27%20%C3%A0(s)%2010.13.55_d0cbe205.jpg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://grupodvbr.github.io/aniversariosmercatto/">

<meta name="twitter:card" content="summary_large_image">
<title>Reservas • Mercatto Delícia</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="color-scheme" content="dark" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --brand:#22c55e;
  --brand-dark:#15803d;
  --bg:#0a0d12;
  --card:#11151c;
  --border:rgba(255,255,255,.08);
  --text:#f5f7fb;
  --muted:#9ca3af;
  --radius:18px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#101722,#0a0d12 70%);
  color:var(--text);
  min-height:100vh;
}

/* HERO */
header{
  padding:24px 16px 10px;
}

.hero{
  max-width:880px;
  margin:auto;
  position:relative;
}

.hero-img{
  width:100%;
  border-radius:24px;
  display:block;
  box-shadow:0 25px 60px rgba(0,0,0,.6);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
  pointer-events:none;
}

/* ACTION BUTTONS */
.actions{
  max-width:880px;
  margin:22px auto 0;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  padding:16px;
  border-radius:16px;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
  border:1px solid var(--border);
  background:var(--card);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:.25s;
}

.btn:hover{
  transform:translateY(-2px);
  background:#171c24;
}

.btn.whatsapp{
  background:linear-gradient(180deg,var(--brand),var(--brand-dark));
  border:none;
}

@media(max-width:560px){
  .btn{flex:100%}
}

/* MODAL */
dialog{
  width:min(580px,96vw);
  border:none;
  padding:0;
  border-radius:24px;
  background:var(--card);
  color:#fff;
  overflow:hidden;
  animation:fadeIn .25s ease;
}

dialog::backdrop{
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.modal-head{
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:800;
}

.modal-head button{
  background:#1b2029;
  border:1px solid var(--border);
  color:#fff;
  border-radius:12px;
  padding:8px 14px;
  cursor:pointer;
}

.modal-body{
  padding:22px;
  max-height:70vh;
  overflow-y:auto;
}

.modal-body::-webkit-scrollbar{
  width:6px;
}
.modal-body::-webkit-scrollbar-thumb{
  background:#222;
  border-radius:10px;
}

/* FORM */
form{
  display:grid;
  gap:16px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

@media(max-width:640px){
  .row{grid-template-columns:1fr}
}

label{
  font-size:13px;
  font-weight:700;
  margin-bottom:6px;
  display:block;
}

input,textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#0f131a;
  color:#fff;
  font-size:14px;
  transition:.2s;
}

input:focus,textarea:focus{
  border-color:var(--brand);
  outline:none;
  box-shadow:0 0 0 2px rgba(34,197,94,.25);
}

textarea{resize:none}

.submit{
  background:linear-gradient(180deg,var(--brand),var(--brand-dark));
  border:none;
  padding:15px;
  font-weight:900;
  font-size:15px;
  border-radius:16px;
  cursor:pointer;
  transition:.2s;
}

.submit:hover{
  transform:translateY(-2px);
}

.spinner{
  display:none;
  font-size:13px;
  text-align:center;
  color:var(--muted);
}

.spinner.show{display:block}
</style>
</head>
<body>

<header>
  <div class="hero">
    <img class="hero-img"
    src="https://github.com/grupodvbr/aniversariosmercatto/blob/main/paste/Imagem%20do%20WhatsApp%20de%202025-08-27%20%C3%A0(s)%2010.13.55_d0cbe205.jpg?raw=true"
    alt="Mercatto Delícia">
  </div>

  <div class="actions">
    <button id="btnReservar" class="btn">🗓️ Fazer Reserva</button>
    <button id="btnAtendente" class="btn whatsapp">💬 Falar no WhatsApp</button>
  </div>
</header>

<dialog id="modalReserva">
  <div class="modal-head">
    📅 Nova Reserva
    <button id="fecharModal">Fechar</button>
  </div>

  <div class="modal-body">
    <form id="reservaForm">
      
      <div class="row">
        <div>
          <label>Nome</label>
          <input type="text" name="nome" required placeholder="Seu nome completo">
        </div>
        <div>
          <label>Email</label>
          <input type="email" name="email" required placeholder="seu@email.com">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Telefone</label>
          <input type="tel" name="telefone" required placeholder="(77) 9 0000-0000">
        </div>
        <div>
          <label>Pessoas</label>
          <input type="number" name="pessoas" min="1" required placeholder="Quantidade">
        </div>
      </div>

      <div>
        <label>Data e Hora</label>
        <input type="datetime-local" name="datahora" required>
      </div>

      <div>
        <label>Observações</label>
        <textarea name="observacoes" rows="3" placeholder="Preferências, aniversários, mesa específica..."></textarea>
      </div>

      <div id="spinner" class="spinner">Enviando reserva...</div>

      <button class="submit" type="submit">Confirmar Reserva</button>
    </form>
  </div>
</dialog>

<script>
const GAS_ENDPOINT="https://script.google.com/macros/s/AKfycbzl7UY_bsvQS9TSIWUOSfTrKQuKC16ZuMciH28DDronruka4167Dgo04X2VZhiO_dmO/exec";
const WHATSAPP_NUMBER="557736135148";

const modal=document.getElementById("modalReserva");
const btnReservar=document.getElementById("btnReservar");
const btnAtendente=document.getElementById("btnAtendente");
const fecharModal=document.getElementById("fecharModal");
const form=document.getElementById("reservaForm");
const spinner=document.getElementById("spinner");

btnReservar.onclick=()=>modal.showModal();
fecharModal.onclick=()=>modal.close();

btnAtendente.onclick=()=>{
const msg=encodeURIComponent("Olá! Quero fazer uma reserva no Mercatto Delícia.");
window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,"_blank");
};

form.onsubmit=async e=>{
e.preventDefault();
spinner.classList.add("show");

const data=new FormData(form);
const params=new URLSearchParams(data);

try{
await fetch(GAS_ENDPOINT,{method:"POST",body:params});
alert("Reserva enviada com sucesso!");
form.reset();
modal.close();
}catch{
alert("Erro ao enviar reserva.");
}
spinner.classList.remove("show");
};
</script>

</body>
</html>
