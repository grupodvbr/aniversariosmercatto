<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<!-- 🔥 Open Graph (Preview WhatsApp) -->
<meta property="og:title" content="🎉 Aniversário no Mercatto Delícia">
<meta property="og:description" content="Ganhe até R$ 100 OFF no mês do seu aniversário. Reserve agora!">
<meta property="og:image" content="https://raw.githubusercontent.com/grupodvbr/aniversariosmercatto/main/paste/Imagem%20do%20WhatsApp%20de%202025-08-27%20%C3%A0(s)%2010.13.55_d0cbe205.jpg">
<meta property="og:type" content="website">
<meta property="og:url" content="https://grupodvbr.github.io/aniversariosmercatto/">

<meta name="twitter:card" content="summary_large_image">
<title>Reservas • Mercatto Delícia</title>

<meta name="viewport"
content="width=device-width,
initial-scale=1,
maximum-scale=1,
user-scalable=no,
viewport-fit=cover">

<meta name="color-scheme" content="dark" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --brand:#22c55e;
  --brand-dark:#15803d;
  --bg:#0a0d12;
  --card:#11151c;
  --border:rgba(255,255,255,.08);
  --text:#f5f7fb;
  --muted:#9ca3af;
  --radius:18px;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:Inter,sans-serif;
  background:radial-gradient(circle at top,#101722,#0a0d12 70%);
  color:var(--text);
  min-height:100vh;
}

/* HERO */
header{
  padding:24px 16px 10px;
}

.hero{
  max-width:880px;
  margin:auto;
  position:relative;
}

.hero-img{
  width:100%;
  border-radius:24px;
  display:block;
  box-shadow:0 25px 60px rgba(0,0,0,.6);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  background:linear-gradient(to top,rgba(0,0,0,.6),transparent);
  pointer-events:none;
}

/* ACTION BUTTONS */
.actions{
  max-width:880px;
  margin:22px auto 0;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  padding:16px;
  border-radius:16px;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
  border:1px solid var(--border);
  background:var(--card);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  transition:.25s;
}

.btn:hover{
  transform:translateY(-2px);
  background:#171c24;
}

.btn.whatsapp{
  background:linear-gradient(180deg,var(--brand),var(--brand-dark));
  border:none;
}
/* BOTÃO RESERVA DOURADO PREMIUM */
.btn.reservar{
  background:linear-gradient(145deg,#ffd700,#ffb700,#ff8c00);
  border:none;
  color:#2b1a00;
  font-weight:900;
  text-shadow:0 1px 2px rgba(255,255,255,.6);
  box-shadow:
    0 0 10px rgba(255,215,0,.6),
    0 0 20px rgba(255,215,0,.4),
    inset 0 2px 4px rgba(255,255,255,.6);
  position:relative;
  overflow:hidden;
}

/* brilho animado passando */
.btn.reservar::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.9),
    transparent
  );
  transform:skewX(-25deg);
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{left:-120%}
  60%{left:130%}
  100%{left:130%}
}

.btn.reservar:hover{
  transform:translateY(-3px) scale(1.03);
  box-shadow:
    0 0 15px rgba(255,215,0,.8),
    0 0 30px rgba(255,215,0,.6);
}
@media(max-width:560px){
  .btn{flex:100%}
}

/* MODAL */
dialog{
  width:min(580px,96vw);
  border:none;
  padding:0;
  border-radius:24px;
  background:var(--card);
  color:#fff;
  overflow:hidden;
  animation:fadeIn .25s ease;
}

dialog::backdrop{
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(4px);
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.modal-head{
  padding:18px 20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:800;
}

.modal-head button{
  background:#1b2029;
  border:1px solid var(--border);
  color:#fff;
  border-radius:12px;
  padding:8px 14px;
  cursor:pointer;
}

.modal-body{
  padding:22px;
  max-height:70vh;
  overflow-y:auto;
}

.modal-body::-webkit-scrollbar{
  width:6px;
}
.modal-body::-webkit-scrollbar-thumb{
  background:#222;
  border-radius:10px;
}

/* FORM */
form{
  display:grid;
  gap:16px;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

@media(max-width:640px){
  .row{grid-template-columns:1fr}
}

label{
  font-size:13px;
  font-weight:700;
  margin-bottom:6px;
  display:block;
}

input,textarea{
  width:100%;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#0f131a;
  color:#fff;
  font-size:14px;
  transition:.2s;
}

input:focus,textarea:focus{
  border-color:var(--brand);
  outline:none;
  box-shadow:0 0 0 2px rgba(34,197,94,.25);
}

textarea{resize:none}

.submit{
  background:linear-gradient(180deg,var(--brand),var(--brand-dark));
  border:none;
  padding:15px;
  font-weight:900;
  font-size:15px;
  border-radius:16px;
  cursor:pointer;
  transition:.2s;
}

.submit:hover{
  transform:translateY(-2px);
}

.spinner{
  display:none;
  font-size:13px;
  text-align:center;
  color:var(--muted);
}

.spinner.show{display:block}

/* CUPOM */



.logoCupom{
width:140px;
margin-bottom:12px;
}

.cupom h2{
margin:6px 0 16px;
font-size:36px;
color:#d4af37;
letter-spacing:2px;
}

.desc{
color:#ddd;
font-size:15px;
}

.valor{
font-size:40px;
font-weight:900;
margin:14px 0;
background:linear-gradient(90deg,#ffd700,#ffb700,#ffd700);
-webkit-background-clip:text;
color:transparent;
}

.info{
font-size:15px;
color:#fff;
margin-bottom:14px;
}

.regras{
font-size:12px;
color:#aaa;
margin-bottom:18px;
}

.codigo{
font-size:18px;
letter-spacing:3px;
font-weight:800;
background:#111;
border:1px dashed #d4af37;
padding:12px;
border-radius:10px;
margin-bottom:18px;
}

.baixar{
background:linear-gradient(145deg,#ffd700,#ffb700);
border:none;
padding:12px 18px;
border-radius:10px;
font-weight:800;
cursor:pointer;
}

.baixar:hover{
transform:scale(1.05);
}


/* POPUP CUPOM */

.popupCupom{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,.88);
backdrop-filter:blur(8px);

display:none;
align-items:center;
justify-content:center;

z-index:9999;

animation:fadeCupom .35s ease;
}

@keyframes fadeCupom{
from{
opacity:0;
transform:scale(.95);
}
to{
opacity:1;
transform:scale(1);
}
}

.popupContainer{
text-align:center;

max-height:90vh;
overflow:auto;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

gap:14px;
padding:10px;
}

.cupom{
width:420px;
max-width:92vw;

padding:40px;

border-radius:24px;

background:
linear-gradient(180deg,#000,#0c0c0c);

border:1px solid rgba(255,215,0,.45);

box-shadow:
0 30px 80px rgba(0,0,0,.9),
0 0 35px rgba(255,215,0,.35);

text-align:center;

position:relative;
overflow:hidden;
}

.cupom:before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;

background:
radial-gradient(circle at top,rgba(255,215,0,.12),transparent 60%);

pointer-events:none;
}

/* CUPOM PREMIUM */

.cupom{
width:90vw;
max-width:380px;

max-height:70vh;

padding:26px 22px;

border-radius:22px;

background:linear-gradient(180deg,#020202,#0c0c0c);

border:1px solid rgba(255,215,0,.6);

box-shadow:
0 30px 70px rgba(0,0,0,.9),
0 0 30px rgba(255,215,0,.3),
inset 0 0 30px rgba(255,215,0,.08);

text-align:center;

position:relative;

overflow:auto;
}
  

.cupom:after{
content:"";
position:absolute;
top:-40%;
left:-40%;
width:180%;
height:180%;

background:
radial-gradient(circle,
rgba(255,215,0,.08),
transparent 60%);

pointer-events:none;
}

.logoCupom{
width:110px;
margin-bottom:12px;
}

.cupom h2{
font-size:28px;
color:#d4af37;
letter-spacing:3px;
margin-bottom:10px;
}

.linha{
height:1px;
background:linear-gradient(90deg,transparent,#d4af37,transparent);
margin:16px 0;
}

.nome{
font-size:18px;
font-weight:900;
color:#ffd700;
margin-bottom:8px;
letter-spacing:.6px;
text-transform:uppercase;
}

.reservaInfo{
font-size:14px;
color:#aaa;
margin-bottom:18px;
}

.valor{
font-size:32px;
font-weight:900;
margin:10px 0;

background:linear-gradient(90deg,#ffd700,#ffb700,#ffd700);
-webkit-background-clip:text;
color:transparent;
}

.info{
font-size:16px;
color:#eee;
margin-bottom:18px;
}

.codigo{
font-size:20px;
letter-spacing:4px;
font-weight:900;

background:#0c0c0c;
border:2px dashed #d4af37;
padding:14px;
border-radius:12px;
}

.baixar{
margin-top:20px;

background:linear-gradient(145deg,#ffd700,#ffb700);
border:none;

padding:16px 26px;

border-radius:14px;

font-weight:900;
font-size:15px;

cursor:pointer;

box-shadow:0 0 18px rgba(255,215,0,.4);
}

.baixar:hover{
transform:scale(1.06);
}

.fecharCupom{
position:absolute;
top:25px;
right:25px;

background:rgba(0,0,0,.6);
border:1px solid rgba(255,255,255,.2);

width:36px;
height:36px;

border-radius:50%;

color:#fff;
font-size:18px;

cursor:pointer;
}
</style>
</head>
<body>

<header>
  <div class="hero">
<img class="hero-img"
crossorigin="anonymous"
src="https://raw.githubusercontent.com/grupodvbr/aniversariosmercatto/main/paste/Imagem%20do%20WhatsApp%20de%202025-08-27%20%C3%A0(s)%2010.13.55_d0cbe205.jpg"
alt="Mercatto Delícia">
  </div>

  <div class="actions">
<button id="btnReservar" class="btn reservar">🗓️ Fazer Reserva</button>
    <button id="btnAtendente" class="btn whatsapp">💬 Falar no WhatsApp</button>
  </div>
</header>

<dialog id="modalReserva">
  <div class="modal-head">
    📅 Nova Reserva
    <button id="fecharModal">Fechar</button>
  </div>

  <div class="modal-body">
    <form id="reservaForm">
      
      <div class="row">
        <div>
          <label>Nome</label>
          <input type="text" name="nome" required placeholder="Seu nome completo">
        </div>
        <div>
          <label>Email</label>
          <input type="email" name="email" required placeholder="seu@email.com">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Telefone</label>
          <input type="tel" name="telefone" required placeholder="(77) 9 0000-0000">
        </div>
        <div>
          <label>Pessoas</label>
          <input type="number" name="pessoas" min="1" required placeholder="Quantidade">
        </div>
      </div>

      <div>
        <label>Data e Hora</label>
        <input type="datetime-local" name="datahora" required>
      </div>

      <div>
        <label>Observações</label>
        <textarea name="observacoes" rows="3" placeholder="Preferências, aniversários, mesa específica..."></textarea>
      </div>

      <div id="spinner" class="spinner">Enviando reserva...</div>

      <button class="submit" type="submit">Confirmar Reserva</button>
    </form>
  </div>
</dialog>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
const GAS_ENDPOINT="https://script.google.com/macros/s/AKfycbzl7UY_bsvQS9TSIWUOSfTrKQuKC16ZuMciH28DDronruka4167Dgo04X2VZhiO_dmO/exec";
const WHATSAPP_NUMBER="557736135148";

const modal=document.getElementById("modalReserva");
const btnReservar=document.getElementById("btnReservar");
const btnAtendente=document.getElementById("btnAtendente");
const fecharModal=document.getElementById("fecharModal");
const form=document.getElementById("reservaForm");
const spinner=document.getElementById("spinner");

btnReservar.onclick=()=>modal.showModal();
fecharModal.onclick=()=>modal.close();

btnAtendente.onclick=()=>{
const msg=encodeURIComponent("Olá! Quero fazer uma reserva no Mercatto Delícia.");
window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`,"_blank");
};

form.onsubmit=async e=>{

e.preventDefault();

document.getElementById("overlayLoading").style.display="flex";
spinner.classList.add("show");

const data=new FormData(form);

const nome=data.get("nome");

const dataHora=data.get("datahora");

const params=new URLSearchParams(data);

try{

await fetch(GAS_ENDPOINT,{
method:"POST",
body:params,
mode:"no-cors"
});

await new Promise(r=>setTimeout(r,1200));
  
modal.close();

form.reset();

const codigo="MERCATTO-"+Math.floor(100000+Math.random()*900000);

document.getElementById("codigoCupom").innerText=codigo;

document.getElementById("cupomNome").innerText=nome;

const dataFormatada=new Date(dataHora);

const textoData=dataFormatada.toLocaleDateString("pt-BR")+" • "+dataFormatada.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});

document.getElementById("cupomData").innerHTML=
"📅 "+textoData;
  
document.getElementById("popupCupom").style.display="flex";
// salvar último cupom
localStorage.setItem("ultimoCupom",JSON.stringify({
nome:nome,
data:textoData,
codigo:codigo
}));
}catch{

alert("Erro ao enviar reserva");

}

spinner.classList.remove("show");

document.getElementById("overlayLoading").style.display="none";
};


  
document.addEventListener("DOMContentLoaded",()=>{

const ultimo=localStorage.getItem("ultimoCupom");

if(ultimo){

const cupom=JSON.parse(ultimo);

document.getElementById("codigoCupom").innerText=cupom.codigo;
document.getElementById("cupomNome").innerText=cupom.nome;
document.getElementById("cupomData").innerHTML="📅 "+cupom.data;

document.getElementById("popupCupom").style.display="flex";

}

/* DOWNLOAD DO CUPOM */

const botao=document.getElementById("baixarCupom");

botao.addEventListener("click",async()=>{

try{

const cupom=document.getElementById("cupom");

botao.innerText="Gerando imagem...";

await document.fonts.ready;

const canvas=await html2canvas(cupom,{
scale:4,
useCORS:true,
allowTaint:false,
backgroundColor:null
});

const imagem=canvas.toDataURL("image/png");

botao.innerText="⬇️ Baixar Cupom";

const a=document.createElement("a");
a.href=imagem;
a.download="cupom-mercatto.png";
a.target="_blank";

document.body.appendChild(a);
a.click();

setTimeout(()=>{
a.remove();
},100);

/* fallback celular */

setTimeout(()=>{

if(/iPhone|iPad|Android/i.test(navigator.userAgent)){
window.open(imagem,"_blank");
}

},300);

}catch(err){

console.error(err);
alert("Erro ao gerar cupom");

}

});
function fecharCupom(e){

if(e.target.id==="popupCupom"){

document.getElementById("popupCupom").style.display="none";

}

}
</script>
<div id="popupCupom" class="popupCupom" onclick="fecharCupom(event)">

<button class="fecharCupom"
onclick="document.getElementById('popupCupom').style.display='none'">
✕
</button>  
<div class="popupContainer" onclick="event.stopPropagation()">
<div id="cupom" class="cupom">

<img class="logoCupom"
crossorigin="anonymous"
src="https://raw.githubusercontent.com/grupodvbr/aniversariosmercatto/main/paste/logo.png">
<h2>ANIVERSÁRIO</h2>

<div class="linha"></div>

<p class="nome" id="cupomNome"></p>

<p class="reservaInfo" id="cupomData"></p>

<div class="valor">ATÉ R$100 OFF</div>

<p class="info">
Consuma a partir de <b>R$100</b><br>
ganhe <b>20% de desconto</b><b>-regras no banner</b>
</p>

<div id="codigoCupom" class="codigo"></div>

</div>

<button id="baixarCupom" class="baixar">
⬇️ Baixar Cupom
</button>

</div>
</div>


<div id="overlayLoading" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.92);
backdrop-filter:blur(6px);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
transition:opacity .25s ease;
">

<div style="text-align:center">

<div style="
width:60px;
height:60px;
border:5px solid rgba(255,255,255,.2);
border-top:5px solid #ffd700;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto">
</div>

<p style="
margin-top:18px;
font-weight:700;
color:#fff">
Registrando sua reserva...
</p>

</div>
</div>

<style>
@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}
</style>
</body>
</html>
